favorites:
  - latency
  - error_rate
  - cpu
  - memory
  - throttling
groups:
  oms:
    name: OMS
  os:
    name: OS
metrics:
  latency:
    unit: ms
    description: Request latency.
    group: oms
  throughput:
    unit: tps
    description: Throughput.
    group: oms
  error_rate:
    unit: percent
    description: Error rate.
    group: oms
  cpu:
    unit: mCPU
    description: CPU usage.
    group: os
    topology:
      aggregation: sum
  memory:
    unit: MB
    description: Memory usage.
    group: os
    topology:
      aggregation: sum
  throttling:
    unit: percent
    description: CPU throttling.
    group: os
    topology:
      aggregation: max
