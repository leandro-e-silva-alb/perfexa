latency:
  unit: ms
  description: Request latency.
throughput:
  unit: tps
  description: Throughput.
error_rate:
  unit: percent
  description: Error rate.
cpu:
  unit: mCPU
  description: CPU usage.
  topology:
    aggregation: sum
memory:
  unit: MB
  description: Memory usage.
  topology:
    aggregation: sum
throttling:
  unit: percent
  description: CPU throttling.
  topology:
    aggregation: max
